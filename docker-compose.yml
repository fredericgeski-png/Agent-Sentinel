version: '3.8'

services:
  kinetic-monitor:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgres://kinetic:kineticpass@postgres:5432/kinetic
      - PORT=5000
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=kinetic
      - POSTGRES_PASSWORD=kineticpass
      - POSTGRES_DB=kinetic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinetic"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
